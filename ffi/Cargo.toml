[package]
name = "cpsl-ffi"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "cpsl"
crate-type = ["cdylib"]

[dependencies]
cpsl-core = { path = "../core", default-features = false, features = ["mod-fs", "mod-json", "mod-csv"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
libloading = "0.8"
tempfile = "3"
